spring:
  application:
    name: pharmago-backend


  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/pharmago
    username: pharmago_user
    password: pharmago_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  logging:
    level:
      org.flywaydb: DEBUG

pharmago:
  admin:
    api-key: ${ADMIN_API_KEY:pharmago-dev-key-2026}

server:
  port: 9090