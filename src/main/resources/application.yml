spring:
  application:
    name: pharmago-backend

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pharmago}
    username: ${SPRING_DATASOURCE_USERNAME:pharmago_user}
    password: ${SPRING_DATASOURCE_PASSWORD:pharmago_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

pharmago:
  admin:
    api-key: ${ADMIN_API_KEY:pharmago-dev-key-2026}

google:
  places:
    api-key: ${GOOGLE_API_KEY:ta-cle-ici}

springdoc:
  swagger-ui:
    url: https://phramago-backend-production.up.railway.app/v3/api-docs
  api-docs:
    enabled: true

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
